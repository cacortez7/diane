<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:22px;font-family:var(--font-mono);}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .tok{font-size:11px;color:var(--text-muted);width:90px;flex:none;}
  .bar{height:14px;background:var(--green);border-radius:2px;box-shadow:0 0 10px -2px var(--green);}
</style></head>
<body>
  <div class="r"><span class="tok">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="tok">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="tok">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="tok">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="tok">space-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="tok">space-8 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="tok">space-12 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="tok">space-16 · 64</span><span class="bar" style="width:64px"></span></div>
</body></html>
