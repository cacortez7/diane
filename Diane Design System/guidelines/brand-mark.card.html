<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:26px;display:flex;gap:24px;align-items:center;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
  .m96{width:96px;height:96px;}
  .m48{width:48px;height:48px;}
  .m28{width:28px;height:28px;}
  .onlight{background:var(--green);border-radius:22px;padding:14px;display:grid;place-items:center;box-shadow:var(--glow-green);}
</style></head>
<body>
  <div class="tile"><img class="m96" src="../assets/diane-mark.svg" alt="Diane"><div class="lab">96px</div></div>
  <div class="tile"><img class="m48" src="../assets/diane-mark.svg" alt=""><div class="lab">48px</div></div>
  <div class="tile"><img class="m28" src="../assets/diane-mark.svg" alt=""><div class="lab">28px</div></div>
  <div class="tile"><div class="onlight"><svg width="40" height="40" viewBox="0 0 128 128" fill="none"><path d="M38 44 L58 64 L38 84" stroke="#04140c" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="68" y="76" width="26" height="9" rx="2" fill="#04140c"/></svg></div><div class="lab">on green</div></div>
</body></html>
