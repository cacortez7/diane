<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Sharp & technical — low radii" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:22px;font-family:var(--font-mono);}
  .grid{display:flex;gap:14px;}
  .item{text-align:center;}
  .box{width:78px;height:54px;background:var(--surface-2);border:1px solid var(--border-strong);}
  .lab{font-size:10px;color:var(--text-muted);margin-top:8px;}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lab">xs · 2</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 3</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 5</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl · 12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:54px"></div><div class="lab">pill</div></div>
  </div>
</body></html>
