<!-- @dsCard group="Type" viewport="700x200" name="Type families" subtitle="IBM Plex Mono (hero) + IBM Plex Sans (prose)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:24px;}
  .blk{margin-bottom:20px;}
  .blk:last-child{margin-bottom:0;}
  .k{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--text-muted);margin:0 0 8px;}
  .mono{font-family:var(--font-mono);font-size:30px;color:var(--text-primary);font-weight:500;}
  .sans{font-family:var(--font-sans);font-size:24px;color:var(--text-primary);}
  .sub{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);margin-top:6px;}
</style></head>
<body>
  <div class="blk">
    <p class="k">Mono · IBM Plex Mono — headings, data, logs, UI</p>
    <div class="mono">diane — doblaje EN→ES</div>
    <div class="sub">aA bB gG · 0123456789 · -ngl 24 · 13.5/16 GB · rc=0</div>
  </div>
  <div class="blk">
    <p class="k">Sans · IBM Plex Sans — running prose</p>
    <div class="sans">Voz clonada de la original, 100% offline en GPU local.</div>
  </div>
</body></html>
