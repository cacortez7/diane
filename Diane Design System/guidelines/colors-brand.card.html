<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .chip{height:56px;}
  .meta{padding:7px 10px;font-family:var(--font-mono);background:var(--surface-1);}
  .name{font-size:11px;color:var(--text-primary);}
  .hex{font-size:10px;color:var(--text-muted);margin-top:2px;}
  .glow{margin-top:14px;font-family:var(--font-mono);font-size:13px;color:var(--green-bright);text-shadow:var(--glow-text-green);}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="meta"><div class="name">green</div><div class="hex">#46e08f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-bright)"></div><div class="meta"><div class="name">green-bright</div><div class="hex">#74f0a9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-dim)"></div><div class="meta"><div class="name">green-dim</div><div class="hex">#2b9d62</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-deep)"></div><div class="meta"><div class="name">green-deep</div><div class="hex">#123524</div></div></div>
  </div>
  <div class="glow">✓ listo — outputs en workspace/a1f9c2d4/07_final.mp4</div>
</body></html>
