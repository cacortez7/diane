project_codename: "Diane"
version: "1.0.0"
hardware_target: "RTX 4070 Ti SUPER"
vram_gb: 16
source_language: "en"
target_language: "es"
default_preset: "balanced"
translation_backend: "gemini"
translation_description: "YouTube tech/AI speech. Rules: 1) Informal Latin American Spanish, never Spain Spanish. 2) Convert ALL numbers to words (17=diecisiete, 2005=dos mil cinco). 3) Write English proper nouns phonetically in Spanish (Apple=Ápol, Stanford=Stánford, Steve=Stív, Jobs=Yobs, iOS=ai-o-és). 4) Keep each subtitle SHORT and CONCISE, Spanish must not exceed original English duration. 5) Never translate proper names, write them phonetically instead."
gemini_model: "gemini-2.5-flash"
translation_context_window: 8   # segmentos previos como contexto (backend local)
# local_llm_path: "models/llm/Qwen3.6-35B-A3B-IQ4_XS.gguf"  # default: primer .gguf en models/llm/
tts_model_dir: "models/tts/fish-s2-pro"
tts_half: false   # true = FP16 fallback si hay presión de VRAM (default BF16)
instrumental_volume: 0.7   # volumen de la música de fondo en la mezcla final
synthesize_batch_size: 25  # unidades por subproceso de síntesis (anti-leak)

# --- Síntesis por oraciones (synthesize) ---
synth_seed: 42                 # misma seed para todo el job (prosodia reproducible)
synth_temperature: 0.7         # 0.8 (calibrado S1-mini) alucinaba idiomas en S2 Pro
synth_top_p: 0.7
synth_repetition_penalty: 1.1
synth_max_new_tokens: 1024     # cap efectivo por unidad: min(esto, max(128, chars*8))
synth_text_padding: false      # prefijo ". " (solo S1-mini; en S2 Pro alucina)
synth_trim_threshold_db: -45   # trim de silencio SOLO al final de cada WAV
synth_trim_max_ms: 500
merge_gap_ms: 1000             # gap máximo entre subtítulos para fusionar en oración
unit_min_duration_ms: 1000     # duración mínima por unidad-oración

# --- Ensamblado cursor/drift (align_timing) ---
max_compression: 1.2       # compresión máxima de rubberband (NUNCA se estira)
